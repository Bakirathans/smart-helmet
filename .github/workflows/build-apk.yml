name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare web assets directory (www)
        run: |
          mkdir www
          cp index.html www/
          cp alerts.html www/
          cp analytics.html www/
          cp compliance.html www/
          cp safety.html www/
          cp settings.html www/
          cp manifest.json www/
          cp service-worker.js www/
          cp -r css www/
          cp -r js www/
          cp -r icons www/

      - name: Install Capacitor CLI and dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor Config
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.smarthelmet.safety",
            "appName": "SmartHelmet Safety Monitor",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Add Android platform and Sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartHelmet-Safety-Monitor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
